name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore ProjectVantage.slnx

    - name: Verify Code Formatting
      run: dotnet format ProjectVantage.slnx --verify-no-changes --no-restore

    - name: Build Solution
      run: dotnet build ProjectVantage.slnx -c Release --no-restore

    - name: Execute Tests
      run: dotnet test ProjectVantage.slnx -c Release --no-build --verbosity normal